name: CI/CD with Cortex

on:
  push:
    branches:
      - main

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # Docker build
      - name: Build Docker image
        run: docker build -t demo-cicd-app .

      # Cortex integration
      - name: Install Cortex CLI
        run: curl -sSL https://install.cortex.io | bash

      - name: Cortex login
        run: cortex login --api-key yaYa769yCwNA8tkDrliBJ7HPgXA9HoZ4JXUF7E9zJbZ3k1pAF73e3YNznPh3oT8GhbwVGvQ8049pS09gj8WMlvPOcA695VRPazAjM8ZJqL0809kjgjCmMdlvkFbAfG1I

      - name: Scan Docker image with Cortex
        run: cortex scan image demo-cicd-app:latest