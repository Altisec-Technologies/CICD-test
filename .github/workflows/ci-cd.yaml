name: CI/CD with Cortex

on:
  push:
    branches:
      - main

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build Docker image
      - name: Build Docker image
        run: docker build -t demo-cicd-app:latest .

      # 6. Install Cortex CLI (FIXED)
      - name: Install Cortex CLI
        run: |
          sudo apt install jq -y
          crtx_resp=$(curl -s "https://api-atpl-nfr.xdr.in.paloaltonetworks.com/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" -H "x-xdr-auth-id: 45" -H "Authorization: NrQivSxdJwfgerY61f61cErkGpUA1dAUECToHiU2xsxfCfjiRmDEGraLFh5dHOSTYfsgyzuNSehmS2uKSpzM3i7CAZ3RMWTVfXHR6Jp8kGdgH9jbqKb83kKbhfW5TeLZ") && crtx_url=$(echo $crtx_resp | jq -r ".signed_url") && crtx_file=$(echo $crtx_resp | jq -r ".file_name") && curl -o $crtx_file $crtx_url 
          chmod +x cortexcli
          curl -k -u 45::NrQivSxdJwfgerY61f61cErkGpUA1dAUECToHiU2xsxfCfjiRmDEGraLFh5dHOSTYfsgyzuNSehmS2uKSpzM3i7CAZ3RMWTVfXHR6Jp8kGdgH9jbqKb83kKbhfW5TeLZ --output ./cortexcli https://api-atpl-nfr.xdr.in.paloaltonetworks.com/api/v2/remote-li/{version}/{platform}/artifacts
          chmod +x cortexcli
          ls -la

      # 7. Verify installation (DEBUG step)
      - name: Verify Cortex CLI
        run: cortexcli -v

      # 8. Login using secret
      - name: Cortex Login
        run: cortex login --api-key d3r1fsJinwU4va3ydeixVGnuB328dlDgr5w11NHJbT936qsu56qU4kF9Zboa6MRRVI9qGeFQXbss10LPI0DnHP5ehZQyV3f7JikD933FdeI7vi6WIBzlmegopjbXqHnA

      # 9. Scan image
      - name: Scan Docker image with Cortex
        run: cortex scan image demo-cicd-app:latest